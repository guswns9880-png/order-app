<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발주 앱</title>
<link rel="manifest" href="manifest.json">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f2f2f2
}

header{
background:#111;
color:white;
padding:12px;
text-align:center;
font-size:17px
}

.container{
padding:12px
}

.item{
display:flex;
align-items:center;
gap:4px;
background:white;
margin-bottom:6px;
padding:6px 8px;
border-radius:6px
}

.item span{
flex:1;
font-size:15px;
font-weight:600;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis
}

input[type='number']{
width:36px;
text-align:center
}

button{
padding:4px 6px;
border:none;
border-radius:5px;
background:#222;
color:white;
font-size:12px
}

.qtybtn{
width:22px;
height:22px;
padding:0;
background:#444
}

.controls{
display:flex;
gap:6px;
margin-top:8px;
flex-wrap:wrap
}

#result,#history{
margin-top:15px;
background:white;
padding:10px;
border-radius:8px;
font-size:14px
}

.dragging{
opacity:0.5
}

</style>
</head>
<body>

<header>📦 발주 앱</header>

<div class="container">

<div id="items"></div>

<div class="controls">
<input type="text" id="newItem" placeholder="항목 추가">
<button onclick="addItem()">추가</button>
<button onclick="resetQty()">수량 초기화</button>
</div>

<div class="controls">
<button onclick="completeOrder()">완료</button>
</div>

<div id="result"></div>
<div id="history"></div>

</div>

<script>

const defaultItems=[
"토스트빵","육수","밀떡","치즈떡","구슬떡","볶음소스","알밥 단무지","깍둑 단무지",
"쌈무","멸균우유","휘핑크림","그라나파다노 치즈","다진마늘","깐계란","분말가루",
"우동면","칼국수면","버터","꼬들무 명태회","김치전골","맑은전골","왕만두","종합어묵",
"꼬치어묵","부산어묵","냉동딸기","냉동망고","두부김치","무뼈닭발","오돌뼈","쭈꾸미",
"부추전","먹태","육회","김치전","베이컨,크럼블","옥수수전","치킨","고추튀김",
"돈까스","닭갈비","곱대창","수비드삼겹살","목전지","뼈닭발","은행","우유튀김",
"새우살","냉동감자","스마일감자(쿠팡)","데이터펍스(쿠팡)","묵사발육수","식혜",
"찌개두부","돼지갈비소스","무침소스","특제간장","초간장","마요네즈","우동다시",
"돈까스소스","당면","빙수팥","후르츠칵","빙수떡","사리면","체다슬","우삼겹",
"피자치즈","절단꽃게","펩시콜라","명태튀각","조미김가루","우동건더기","테이블냅킨","핸드타올"
]

let items=[]
let dragIndex=null

function load(){
const saved=localStorage.getItem("order_items")

if(saved){
items=JSON.parse(saved)
}else{
items=defaultItems.map(n=>({name:n,qty:0}))
}

render()
renderHistory()
}

function save(){
localStorage.setItem("order_items",JSON.stringify(items))
}

function render(){

const container=document.getElementById("items")
container.innerHTML=""

items.forEach((item,index)=>{

const div=document.createElement("div")
div.className="item"
div.draggable=true

div.innerHTML=`
<span>${item.name}</span>
<button class="qtybtn" onclick="changeQty(${index},-1)">-</button>
<input type="number" min="0" value="${item.qty}" onchange="updateQty(${index},this.value)">
<button class="qtybtn" onclick="changeQty(${index},1)">+</button>
<button onclick="editItem(${index})">수정</button>
<button onclick="removeItem(${index})">삭제</button>
`

div.addEventListener("dragstart",()=>dragIndex=index)

div.addEventListener("dragover",e=>e.preventDefault())

div.addEventListener("drop",()=>{

const moved=items.splice(dragIndex,1)[0]
items.splice(index,0,moved)

save()
render()

})

container.appendChild(div)

})

}

function addItem(){
const input=document.getElementById("newItem")
const name=input.value.trim()
if(!name) return
items.push({name,qty:0})
input.value=""
save()
render()
}

function removeItem(index){
items.splice(index,1)
save()
render()
}

function editItem(index){
const newName=prompt("항목 이름 수정",items[index].name)
if(!newName) return
items[index].name=newName
save()
render()
}

function updateQty(index,val){
items[index].qty=parseInt(val)||0
save()
}

function changeQty(index,amount){
items[index].qty+=amount
if(items[index].qty<0) items[index].qty=0
save()
render()
}

function resetQty(){
items.forEach(i=>i.qty=0)
save()
render()
}

function completeOrder(){

const result=document.getElementById("result")
result.innerHTML="<h3>발주 리스트</h3>"

const ordered=items.filter(i=>i.qty>0)

ordered.forEach(i=>{
const p=document.createElement("p")
p.textContent=i.name+" "+i.qty
result.appendChild(p)
})

saveHistory(ordered)
renderHistory()

}

function getTodayKey(){
const d=new Date()
return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()
}

function saveHistory(list){

if(list.length===0) return

let history=JSON.parse(localStorage.getItem("order_history")||"[]")

const today=getTodayKey()

history=history.filter(h=>h.date!==today)

history.push({date:today,items:list})

const now=new Date()

history=history.filter(h=>{
const d=new Date(h.date)
const diff=(now-d)/(1000*60*60*24)
return diff<=2
})

localStorage.setItem("order_history",JSON.stringify(history))

}

function renderHistory(){

const container=document.getElementById("history")
let history=JSON.parse(localStorage.getItem("order_history")||"[]")

if(history.length===0){
container.innerHTML=""
return
}

container.innerHTML="<h3>최근 발주 내역</h3>"

history.sort((a,b)=>new Date(b.date)-new Date(a.date))

history.forEach(day=>{

const div=document.createElement("div")
div.className="history-day"

const title=document.createElement("strong")
title.textContent=day.date

div.appendChild(title)

day.items.forEach(i=>{
const p=document.createElement("p")
p.textContent=i.name+" "+i.qty
div.appendChild(p)
})

container.appendChild(div)

})

}

load()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
