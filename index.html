<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발주 앱</title>
<link rel="manifest" href="manifest.json">

<style>
body{font-family:sans-serif;margin:0;background:#f2f2f2}
header{background:#111;color:white;padding:12px;text-align:center;font-size:17px}
.tabs{display:flex;background:#222}
.tab{flex:1;padding:10px;color:white;text-align:center;cursor:pointer}
.tab.active{background:#444}
.container{padding:12px}
.group{margin-bottom:10px}
.group-title{background:#ddd;padding:6px;border-radius:6px;font-weight:bold;cursor:pointer}
.item{display:flex;align-items:center;gap:6px;background:white;margin-bottom:6px;padding:8px;border-radius:6px}
.item span{flex:1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prev{font-size:11px;color:#888}
input[type='number']{width:45px;text-align:center}
button{padding:4px 6px;border:none;border-radius:5px;background:#222;color:white;font-size:12px}
.sortbtn{width:26px;height:24px;padding:0;background:#555}
.controls{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.history-grid{display:flex;gap:10px}
.history-col{flex:1;background:white;padding:10px;border-radius:8px}
</style>
</head>

<body>

<header>📦 발주 앱</header>

<div class="tabs">
<div class="tab active" onclick="showTab('order')">발주 입력</div>
<div class="tab" onclick="showTab('history')">발주 확인</div>
<div class="tab" onclick="showTab('groups')">그룹 설정</div>
</div>

<div class="container">

<div id="orderPage">
<div class="controls">
<button onclick="toggleSort()">정렬 ON/OFF</button>
</div>
<div id="items"></div>

<div class="controls">
<input type="text" id="newItem" placeholder="항목 추가">
<button onclick="addItem()">추가</button>
<button onclick="resetQty()">수량 초기화</button>
</div>

<div class="controls">
<button onclick="completeOrder()">완료</button>
</div>

<div id="result"></div>
</div>

<div id="historyPage" style="display:none">
<div class="history-grid">
<div class="history-col">
<h3>오늘 발주</h3>
<div id="todayHistory"></div>
</div>
<div class="history-col">
<h3>어제 발주</h3>
<div id="yesterdayHistory"></div>
</div>
</div>
</div>

<div id="groupPage" style="display:none">
<h3>그룹 설정</h3>
<div id="groupEditor"></div>
<button onclick="saveGroups()">그룹 저장</button>
</div>

</div>

<script>

const defaultItems=[ "토스트빵","육수","밀떡","치즈떡","구슬떡","볶음소스","알밥 단무지","깍둑 단무지","쌈무","멸균우유","휘핑크림","그라나파다노 치즈","다진마늘","깐계란","분말가루","우동면","칼국수면","버터","꼬들무 명태회","김치전골","맑은전골","왕만두","종합어묵","꼬치어묵","부산어묵","냉동딸기","냉동망고","두부김치","무뼈닭발","오돌뼈","쭈꾸미","부추전","먹태","육회","김치전","베이컨,크럼블","옥수수전","치킨","고추튀김","돈까스","닭갈비","곱대창","수비드삼겹살","목전지","뼈닭발","은행","우유튀김","새우살","냉동감자","스마일감자(쿠팡)","데이터펍스(쿠팡)","묵사발육수","식혜","찌개두부","돼지갈비소스","무침소스","특제간장","초간장","마요네즈","우동다시","돈까스소스","당면","빙수팥","후르츠칵","빙수떡","사리면","체다슬","우삼겹","피자치즈","절단꽃게","펩시콜라","명태튀각","조미김가루","우동건더기","테이블냅킨","핸드타올" ]

let items=[]
let itemGroups=JSON.parse(localStorage.getItem("item_groups")||"{}")
let sortVisible=false

// ✅ 복구된 탭 기능
function showTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

orderPage.style.display="none"
historyPage.style.display="none"
groupPage.style.display="none"

if(tab==="order"){
orderPage.style.display="block"
document.querySelectorAll(".tab")[0].classList.add("active")
}

if(tab==="history"){
historyPage.style.display="block"
document.querySelectorAll(".tab")[1].classList.add("active")
renderHistory()
}

if(tab==="groups"){
groupPage.style.display="block"
document.querySelectorAll(".tab")[2].classList.add("active")
renderGroupEditor()
}

}

// =========================

function toggleSort(){sortVisible=!sortVisible;render()}

function getYesterdayData(){
let history=JSON.parse(localStorage.getItem("order_history")||"[]")
const d=new Date();d.setDate(d.getDate()-1)
const key=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()
const found=history.find(h=>h.date===key)
const map={}
if(found){found.items.forEach(i=>map[i.name]=i.qty)}
return map
}

function render(){

const container=document.getElementById("items")
container.innerHTML=""

const yesterdayMap=getYesterdayData()
const grouped={}

items.forEach((item,index)=>{
const g=itemGroups[item.name]||"기타"
if(!grouped[g]) grouped[g]=[]
grouped[g].push({item,index})
})

for(const g in grouped){

const groupDiv=document.createElement("div")
const title=document.createElement("div")
title.className="group-title"
title.textContent=g

const itemsDiv=document.createElement("div")

title.onclick=()=>{itemsDiv.style.display=itemsDiv.style.display==="none"?"block":"none"}

grouped[g].forEach(data=>{

const item=data.item
const index=data.index
const prev=yesterdayMap[item.name]||0

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
${sortVisible?`<button class="sortbtn" onclick="moveUp(${index})">▲</button>
<button class="sortbtn" onclick="moveDown(${index})">▼</button>`:""}
<span>${item.name} <span class="prev">(${prev})</span></span>
<input type="number" min="0" value="${item.qty}" onchange="updateQty(${index},this.value)">
<button onclick="editItem(${index})">수정</button>
<button onclick="removeItem(${index})">X</button>
`

itemsDiv.appendChild(div)

})

groupDiv.appendChild(title)
groupDiv.appendChild(itemsDiv)
container.appendChild(groupDiv)

}

}

// ✅ 복구된 그룹 설정 UI
function renderGroupEditor(){

const container=document.getElementById("groupEditor")
container.innerHTML=""

const groupList=["냉장","냉동1","냉동2","소스","기타"]

items.forEach(item=>{
const div=document.createElement("div")
const select=document.createElement("select")

groupList.forEach(g=>{
const op=document.createElement("option")
op.value=g
op.textContent=g
if(itemGroups[item.name]===g) op.selected=true
select.appendChild(op)
})

select.onchange=()=>{itemGroups[item.name]=select.value}

div.innerHTML=`<span>${item.name}</span> `
div.appendChild(select)

container.appendChild(div)
})

}

function saveGroups(){
localStorage.setItem("item_groups",JSON.stringify(itemGroups))
alert("그룹 저장 완료")
render()
}

// =========================

function load(){
const saved=localStorage.getItem("order_items")
items=saved?JSON.parse(saved):defaultItems.map(n=>({name:n,qty:0}))
render()
renderHistory()
}

function save(){localStorage.setItem("order_items",JSON.stringify(items))}

function moveUp(i){if(i===0)return;[items[i],items[i-1]]=[items[i-1],items[i]];save();render()}
function moveDown(i){if(i===items.length-1)return;[items[i],items[i+1]]=[items[i+1],items[i]];save();render()}
function addItem(){let n=newItem.value.trim();if(!n)return;items.push({name:n,qty:0});newItem.value="";save();render()}
function removeItem(i){items.splice(i,1);save();render()}
function editItem(i){let n=prompt("수정",items[i].name);if(!n)return;items[i].name=n;save();render()}
function updateQty(i,v){items[i].qty=parseInt(v)||0;save()}
function resetQty(){items.forEach(i=>i.qty=0);save();render()}

function completeOrder(){
const result=document.getElementById("result")
result.innerHTML="<h3>발주 리스트</h3>"
const ordered=items.filter(i=>i.qty>0)
ordered.forEach(i=>{
const p=document.createElement("p")
p.textContent=i.name+" "+i.qty
result.appendChild(p)
})
saveHistory(ordered)
renderHistory()
}

function getTodayKey(){
const d=new Date()
return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()
}

function saveHistory(list){
if(list.length===0)return
let history=JSON.parse(localStorage.getItem("order_history")||"[]")
const today=getTodayKey()
history=history.filter(h=>h.date!==today)
history.push({date:today,items:list})
localStorage.setItem("order_history",JSON.stringify(history))
}

function renderHistory(){
let history=JSON.parse(localStorage.getItem("order_history")||"[]")
const today=getTodayKey()
const d=new Date();d.setDate(d.getDate()-1)
const yKey=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()

todayHistory.innerHTML=""
yesterdayHistory.innerHTML=""

history.forEach(day=>{
if(day.date===today){
day.items.forEach(i=>todayHistory.innerHTML+=`<p>${i.name} ${i.qty}</p>`)
}
if(day.date===yKey){
day.items.forEach(i=>yesterdayHistory.innerHTML+=`<p>${i.name} ${i.qty}</p>`)
}
})

}

load()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
