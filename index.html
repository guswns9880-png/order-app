<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발주 앱</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.item{
background:white;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:grab;
}

.item span{
flex:1;
}

button{
margin-left:5px;
}

.addbox{
margin-top:20px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:8px;
}

</style>
</head>

<body>

<h1>발주 목록</h1>

<div class="container" id="list"></div>

<div class="addbox">
<input id="newItem" placeholder="항목 추가">
<button onclick="addItem()">추가</button>
</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [

["양배추 슬라이스","닭볶음탕 육수"],
["토스트빵","한우 곱대창"],
["냉동 우동면 5입","찌개두부"],
["냉동 칼국수 5입","두부김치용 김치볶음"],
["당면 1kg","매운 오돌뼈"],
["알밥 단무지","매운 닭발"],
["깍둑 단무지","뼈닭발"],
["쌈무","쭈꾸미 볶음"],
["멸균우유 1000ml","닭갈비"],
["치즈떡볶이 떡 1kg","바사삭 치킨"],
["밀떡 1kg","고추튀김 800g"],
["구슬떡","뉴일식 골드 등신 돈까스"],
["그라나파다노치즈","우유소스튀김"],
["다진마늘 1kg","은행 500g"],
["버터","종합 어묵"],
["깐계란 1kg","꼬치어묵 (CJ)"],
["빙수팥","부산어묵(CJ) 1kg"],
["꼬들무 명태회","한우 육회"],
["냉동 딸기","김치전"],
["냉동 망고","베이컨 567g"],
["빙수떡 200g","부추전"],
["목전지 1kg","새우살 200g"],
["손질한 먹태","옥수수전"],
["김치전골","냉동감자(크링클)"],
["왕만두","돼지갈비장 소스"],
["메인분말가루",""],
["무침소스",""],
["특제간장소스",""],
["볶음 소스 5입",""],
["초간장소스",""],
["우동다시",""],
["마요네즈",""],
["펩시 콜라",""],
["참쌀 식혜",""],
["돈까스 소스",""],
["명태 껍질 튀각",""],
["조미 김가루",""],
["후르츠 칵테일 3kg",""],
["우동 건더기 스프",""],
["테이블 냅킨",""],
["핸드타올 box",""]

];

function save(){
localStorage.setItem("items",JSON.stringify(items));
}

function render(){

const list=document.getElementById("list");
list.innerHTML="";

items.forEach((row,rowIndex)=>{

row.forEach((text,colIndex)=>{

if(!text) return;

const div=document.createElement("div");
div.className="item";
div.draggable=true;

div.innerHTML=`
<span>${text}</span>
<button onclick="editItem(${rowIndex},${colIndex})">✏️</button>
<button onclick="deleteItem(${rowIndex},${colIndex})">❌</button>
`;

div.addEventListener("dragstart",e=>{
e.dataTransfer.setData("text",JSON.stringify([rowIndex,colIndex]));
});

div.addEventListener("dragover",e=>e.preventDefault());

div.addEventListener("drop",e=>{
const from=JSON.parse(e.dataTransfer.getData("text"));
const to=[rowIndex,colIndex];

const temp=items[from[0]][from[1]];
items[from[0]][from[1]]=items[to[0]][to[1]];
items[to[0]][to[1]]=temp;

save();
render();
});

list.appendChild(div);

});

});

}

function editItem(r,c){

let name=prompt("이름 수정",items[r][c]);

if(name){
items[r][c]=name;
save();
render();
}

}

function deleteItem(r,c){

items[r][c]="";
save();
render();

}

function addItem(){

let name=document.getElementById("newItem").value;

if(!name) return;

items.push([name,""]);

document.getElementById("newItem").value="";

save();
render();

}

render();

</script>

</body>
</html>
