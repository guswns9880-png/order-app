<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발주 앱</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:sans-serif;margin:0;background:#f2f2f2}
header{background:#111;color:white;padding:14px;text-align:center;font-size:18px}
.container{padding:15px}
.item{display:flex;align-items:center;gap:10px;background:white;margin-bottom:8px;padding:10px;border-radius:8px}
.item span{flex:1}
input[type='number']{width:70px;padding:5px}
button{padding:10px 14px;border:none;border-radius:8px;background:#111;color:white;font-size:14px}
.controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
#result,#history{margin-top:20px;background:white;padding:12px;border-radius:10px}
#result h3,#history h3{margin-top:0}
.drag{cursor:grab}
.history-day{border-top:1px solid #eee;padding-top:8px;margin-top:8px}
</style>
</head>
<body>

<header>📦 발주 앱</header>

<div class="container">

<div id="items"></div>

<div class="controls">
<input type="text" id="newItem" placeholder="항목 추가">
<button onclick="addItem()">추가</button>
<button onclick="resetQty()">수량 초기화</button>
</div>

<div class="controls">
<button onclick="completeOrder()">완료</button>
</div>

<div id="result"></div>
<div id="history"></div>

</div>

<script>

const defaultItems=[
"참이슬",
"처음처럼",
"콜라",
"사이다",
"맥주",
"양파",
"감자",
"닭"
]

let items=[]

function load(){
const saved=localStorage.getItem("order_items")
if(saved){
items=JSON.parse(saved)
}else{
items=defaultItems.map(n=>({name:n,qty:0}))
}
render()
renderHistory()
}

function save(){
localStorage.setItem("order_items",JSON.stringify(items))
}

function render(){
const container=document.getElementById("items")
container.innerHTML=""

items.forEach((item,index)=>{

const div=document.createElement("div")
div.className="item"
div.draggable=true

div.innerHTML=`
<span class='drag'>☰ ${item.name}</span>
<input type="number" min="0" value="${item.qty}" onchange="updateQty(${index},this.value)">
<button onclick="removeItem(${index})">삭제</button>
`

div.addEventListener("dragstart",e=>{
 e.dataTransfer.setData("text/plain",index)
})

div.addEventListener("dragover",e=>{
 e.preventDefault()
})

div.addEventListener("drop",e=>{
 e.preventDefault()
 const from=e.dataTransfer.getData("text/plain")
 const to=index
 const moved=items.splice(from,1)[0]
 items.splice(to,0,moved)
 save()
 render()
})

container.appendChild(div)

})

}

function addItem(){
const input=document.getElementById("newItem")
const name=input.value.trim()
if(!name) return
items.push({name,qty:0})
input.value=""
save()
render()
}

function removeItem(index){
items.splice(index,1)
save()
render()
}

function updateQty(index,val){
items[index].qty=parseInt(val)||0
save()
}

function resetQty(){
items.forEach(i=>i.qty=0)
save()
render()
}

function completeOrder(){

const result=document.getElementById("result")
result.innerHTML="<h3>발주 리스트</h3>"

const ordered=items.filter(i=>i.qty>0)

ordered.forEach(i=>{
const p=document.createElement("p")
p.textContent=i.name+" "+i.qty
result.appendChild(p)
})

saveHistory(ordered)
renderHistory()
}

function getTodayKey(){
const d=new Date()
return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()
}

function saveHistory(list){

if(list.length===0) return

let history=JSON.parse(localStorage.getItem("order_history")||"[]")

const today=getTodayKey()

history=history.filter(h=>h.date!==today)

history.push({date:today,items:list})

const now=new Date()

history=history.filter(h=>{
const d=new Date(h.date)
const diff=(now-d)/(1000*60*60*24)
return diff<=2
})

localStorage.setItem("order_history",JSON.stringify(history))

}

function renderHistory(){

const container=document.getElementById("history")

let history=JSON.parse(localStorage.getItem("order_history")||"[]")

if(history.length===0){
container.innerHTML=""
return
}

container.innerHTML="<h3>최근 발주 내역</h3>"

history.sort((a,b)=>new Date(b.date)-new Date(a.date))

history.forEach(day=>{

const div=document.createElement("div")
div.className="history-day"

const title=document.createElement("strong")
title.textContent=day.date

div.appendChild(title)

day.items.forEach(i=>{
const p=document.createElement("p")
p.textContent=i.name+" "+i.qty
div.appendChild(p)
})

container.appendChild(div)

})

}

load()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
