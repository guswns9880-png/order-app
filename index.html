<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발주 앱</title>
<link rel="manifest" href="manifest.json">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f2f2f2
}

header{
background:#111;
color:white;
padding:12px;
text-align:center;
font-size:17px
}

.tabs{
display:flex;
background:#222
}

.tab{
flex:1;
padding:10px;
color:white;
text-align:center;
cursor:pointer
}

.tab.active{
background:#444
}

.container{
padding:12px
}

.group{
margin-bottom:10px
}

.group-title{
background:#ddd;
padding:6px;
border-radius:6px;
font-weight:bold;
cursor:pointer
}

.group-items{
margin-top:6px
}

.item{
display:flex;
align-items:center;
gap:6px;
background:white;
margin-bottom:6px;
padding:8px;
border-radius:6px
}

.item span{
flex:1;
font-size:14px;
font-weight:600;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis
}

input[type='number']{
width:45px;
text-align:center
}

button{
padding:4px 6px;
border:none;
border-radius:5px;
background:#222;
color:white;
font-size:12px
}

.sortbtn{
width:26px;
height:24px;
padding:0;
background:#555
}

.controls{
display:flex;
gap:6px;
margin-top:10px;
flex-wrap:wrap
}

#result,#history{
margin-top:15px;
background:white;
padding:10px;
border-radius:8px;
font-size:14px
}

.history-grid{
display:flex;
gap:10px
}

.history-col{
flex:1;
background:white;
padding:10px;
border-radius:8px
}

</style>
</head>

<body>

<header>📦 발주 앱</header>

<div class="tabs">
<div class="tab active" onclick="showTab('order')">발주 입력</div>
<div class="tab" onclick="showTab('history')">발주 확인</div>
</div>

<div class="container">

<div id="orderPage">

<div id="items"></div>

<div class="controls">
<input type="text" id="newItem" placeholder="항목 추가">
<button onclick="addItem()">추가</button>
<button onclick="resetQty()">수량 초기화</button>
</div>

<div class="controls">
<button onclick="completeOrder()">완료</button>
</div>

<div id="result"></div>

</div>

<div id="historyPage" style="display:none">

<div class="history-grid">

<div class="history-col">
<h3>오늘 발주</h3>
<div id="todayHistory"></div>
</div>

<div class="history-col">
<h3>어제 발주</h3>
<div id="yesterdayHistory"></div>
</div>

</div>

</div>

</div>

<script>

const groups={
"냉장":["밀떡","치즈떡","구슬떡","쌈무","찌개두부"],
"냉동":["냉동딸기","냉동망고","냉동감자"],
"소스":["무침소스","특제간장","초간장","마요네즈"],
"건식":["당면","빙수팥","후르츠칵"],
"기타":[]
}

const defaultItems=[
"토스트빵","육수","밀떡","치즈떡","구슬떡","볶음소스","알밥 단무지","깍둑 단무지",
"쌈무","멸균우유","휘핑크림","그라나파다노 치즈","다진마늘","깐계란","분말가루",
"우동면","칼국수면","버터","꼬들무 명태회","김치전골","맑은전골","왕만두","종합어묵",
"꼬치어묵","부산어묵","냉동딸기","냉동망고","두부김치","무뼈닭발","오돌뼈","쭈꾸미",
"부추전","먹태","육회","김치전","베이컨,크럼블","옥수수전","치킨","고추튀김",
"돈까스","닭갈비","곱대창","수비드삼겹살","목전지","뼈닭발","은행","우유튀김",
"새우살","냉동감자","스마일감자(쿠팡)","데이터펍스(쿠팡)","묵사발육수","식혜",
"찌개두부","돼지갈비소스","무침소스","특제간장","초간장","마요네즈","우동다시",
"돈까스소스","당면","빙수팥","후르츠칵","빙수떡","사리면","체다슬","우삼겹",
"피자치즈","절단꽃게","펩시콜라","명태튀각","조미김가루","우동건더기","테이블냅킨","핸드타올"
]

let items=[]

function showTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

if(tab==="order"){
document.getElementById("orderPage").style.display="block"
document.getElementById("historyPage").style.display="none"
document.querySelectorAll(".tab")[0].classList.add("active")
}else{
document.getElementById("orderPage").style.display="none"
document.getElementById("historyPage").style.display="block"
document.querySelectorAll(".tab")[1].classList.add("active")
renderHistory()
}

}

function load(){

const saved=localStorage.getItem("order_items")

if(saved){
items=JSON.parse(saved)
}else{
items=defaultItems.map(n=>({name:n,qty:0}))
}

render()

}

function save(){
localStorage.setItem("order_items",JSON.stringify(items))
}

function getGroup(name){

for(const g in groups){
if(groups[g].includes(name)) return g
}

return "기타"

}

function render(){

const container=document.getElementById("items")
container.innerHTML=""

const grouped={}

items.forEach((item,index)=>{

const g=getGroup(item.name)

if(!grouped[g]) grouped[g]=[]

grouped[g].push({item,index})

})

for(const g in grouped){

const groupDiv=document.createElement("div")
groupDiv.className="group"

const title=document.createElement("div")
title.className="group-title"
title.textContent=g

const itemsDiv=document.createElement("div")
itemsDiv.className="group-items"

title.onclick=()=>{
itemsDiv.style.display=
itemsDiv.style.display==="none"?"block":"none"
}

grouped[g].forEach(data=>{

const item=data.item
const index=data.index

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
<button class="sortbtn" onclick="moveUp(${index})">▲</button>
<button class="sortbtn" onclick="moveDown(${index})">▼</button>
<span>${item.name}</span>
<input type="number" min="0" value="${item.qty}" onchange="updateQty(${index},this.value)">
<button onclick="editItem(${index})">수정</button>
<button onclick="removeItem(${index})">X</button>
`

itemsDiv.appendChild(div)

})

groupDiv.appendChild(title)
groupDiv.appendChild(itemsDiv)

container.appendChild(groupDiv)

}

}

function moveUp(index){
if(index===0) return
const temp=items[index]
items[index]=items[index-1]
items[index-1]=temp
save()
render()
}

function moveDown(index){
if(index===items.length-1) return
const temp=items[index]
items[index]=items[index+1]
items[index+1]=temp
save()
render()
}

function addItem(){
const input=document.getElementById("newItem")
const name=input.value.trim()
if(!name) return
items.push({name,qty:0})
input.value=""
save()
render()
}

function removeItem(index){
items.splice(index,1)
save()
render()
}

function editItem(index){
const newName=prompt("항목 이름 수정",items[index].name)
if(!newName) return
items[index].name=newName
save()
render()
}

function updateQty(index,val){
items[index].qty=parseInt(val)||0
save()
}

function resetQty(){
items.forEach(i=>i.qty=0)
save()
render()
}

function completeOrder(){

const result=document.getElementById("result")
result.innerHTML="<h3>발주 리스트</h3>"

const ordered=items.filter(i=>i.qty>0)

ordered.forEach(i=>{
const p=document.createElement("p")
p.textContent=i.name+" "+i.qty
result.appendChild(p)
})

saveHistory(ordered)

}

function getTodayKey(){
const d=new Date()
return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()
}

function saveHistory(list){

if(list.length===0) return

let history=JSON.parse(localStorage.getItem("order_history")||"[]")

const today=getTodayKey()

history=history.filter(h=>h.date!==today)

history.push({date:today,items:list})

localStorage.setItem("order_history",JSON.stringify(history))

}

function renderHistory(){

let history=JSON.parse(localStorage.getItem("order_history")||"[]")

const today=getTodayKey()

const yesterdayDate=new Date()
yesterdayDate.setDate(yesterdayDate.getDate()-1)

const yesterday=
yesterdayDate.getFullYear()+"-"+(yesterdayDate.getMonth()+1)+"-"+yesterdayDate.getDate()

document.getElementById("todayHistory").innerHTML=""
document.getElementById("yesterdayHistory").innerHTML=""

history.forEach(day=>{

const target=
day.date===today?"todayHistory":
day.date===yesterday?"yesterdayHistory":null

if(!target) return

day.items.forEach(i=>{
const p=document.createElement("p")
p.textContent=i.name+" "+i.qty
document.getElementById(target).appendChild(p)
})

})

}

load()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
